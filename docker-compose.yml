services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dice}
      POSTGRES_DB: ${POSTGRES_DB:-projectdice}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dice}"]
      interval: 5s
      retries: 10

  migrate:
    build: .
    restart: on-failure
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dice}:${POSTGRES_PASSWORD:-dice}@db:5432/${POSTGRES_DB:-projectdice}?schema=public
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dice}:${POSTGRES_PASSWORD:-dice}@db:5432/${POSTGRES_DB:-projectdice}?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
